# Ord v3.0 - Docker Compose Configuration
# AI-Native Company Operating System

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════════
  # ORD CORE
  # ═══════════════════════════════════════════════════════════════════════════════
  ord:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ord-v3
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CEO_CHAT_ID=${CEO_CHAT_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://ord:ord@postgres:5432/ord
      - ORD_DEMO_MODE=${ORD_DEMO_MODE:-false}
    volumes:
      - ./memory:/app/memory
      - ./logs:/app/logs
      - ./finance:/app/finance
    depends_on:
      - redis
      - postgres
      - chroma
    networks:
      - ord-network
    ports:
      - "8000:8000"  # FastAPI API
      - "8080:8080"  # WebSocket

  # ═══════════════════════════════════════════════════════════════════════════════
  # REDIS (Hot Memory)
  # ═══════════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: ord-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - ord-network
    ports:
      - "6379:6379"

  # ═══════════════════════════════════════════════════════════════════════════════
  # POSTGRESQL (Working Memory)
  # ═══════════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: ord-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=ord
      - POSTGRES_PASSWORD=ord
      - POSTGRES_DB=ord
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ord-network
    ports:
      - "5432:5432"

  # ═══════════════════════════════════════════════════════════════════════════════
  # CHROMADB (Cold Memory)
  # ═══════════════════════════════════════════════════════════════════════════════
  chroma:
    image: chromadb/chroma:latest
    container_name: ord-chroma
    restart: unless-stopped
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - ord-network
    ports:
      - "8001:8000"

  # ═══════════════════════════════════════════════════════════════════════════════
  # ORD HQ DASHBOARD (Next.js)
  # ═══════════════════════════════════════════════════════════════════════════════
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ord-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    ports:
      - "3000:3000"
    networks:
      - ord-network
    depends_on:
      - ord

  # ═══════════════════════════════════════════════════════════════════════════════
  # NGINX (Reverse Proxy)
  # ═══════════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: ord-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ord-network
    depends_on:
      - ord
      - dashboard

volumes:
  redis-data:
  postgres-data:
  chroma-data:

networks:
  ord-network:
    driver: bridge
